<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <title>RBCMS</title>
    <script>
        // GitHub Pages SPA workaround
        // Stores the full URL in sessionStorage and redirects to /RBCMS/
        // index.html then picks it up and restores the correct route.
        var pathSegmentsToKeep = 1; // keep /RBCMS in the path
        var l = window.location;
        l.replace(
            l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
            l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
            l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash
        );
    </script>
</head>

<body></body>

</html>
